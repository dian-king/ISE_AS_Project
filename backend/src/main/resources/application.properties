# PostgreSQL Configuration (Local Installation)
server.port=8081
spring.datasource.url=jdbc:postgresql://localhost:5432/ise_as_db
spring.datasource.username=postgres
spring.datasource.password=guess ?
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security / JWT Configuration
iseas.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
iseas.jwt.expiration=86400000
server.forward-headers-strategy=native
logging.level.org.springframework.security=DEBUG

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail Configuration (Example for Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Africa's Talking SMS (primary — East Africa / Rwanda, MTN MoMo & Airtel Money)
# Sign up at https://africastalking.com and get your API key from the dashboard
africas-talking.api-key=
africas-talking.username=sandbox
africas-talking.sender-id=

# Twilio SMS (fallback — used when Africa's Talking is not configured or fails)
twilio.account-sid=
twilio.auth-token=
twilio.from-number=

# SendGrid email (fallback — used when SMTP is not configured or fails)
sendgrid.api-key=
sendgrid.from-email=noreply@igaafriqa.rw
sendgrid.from-name=iga afriqa Admissions

# App base URL (used in email links)
app.base-url=http://localhost:3000
